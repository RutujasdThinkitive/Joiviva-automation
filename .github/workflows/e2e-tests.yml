name: E2E Tests - Daily Run

on:
  schedule:
    # Runs daily at 12:00 PM IST (6:30 AM UTC)
    - cron: '30 6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  # ─── PARALLEL TEST EXECUTION (each spec file on its own worker) ──────────────
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        spec:
          - tests/e2e/add-user.spec.js
          - tests/e2e/clinic-management.spec.js
          - tests/e2e/roles-permission.spec.js
          - tests/e2e/admin-master-code-crud.spec.js

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run ${{ matrix.spec }}
        id: test_run
        continue-on-error: true
        run: PLAYWRIGHT_JSON_OUTPUT_NAME=test-results.json npx playwright test ${{ matrix.spec }} --project=chromium --reporter=json
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          PROVIDER_USERNAME: ${{ secrets.PROVIDER_USERNAME }}
          PROVIDER_PASSWORD: ${{ secrets.PROVIDER_PASSWORD }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ strategy.job-index }}
          path: |
            test-results.json
            test-results/
          retention-days: 30

  # ─── MERGE RESULTS + GENERATE REPORT + NOTIFY ───────────────────────────────
  report:
    needs: e2e-tests
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: results-*
          path: all-results/

      - name: Merge results and generate HTML report
        run: |
          # Merge all JSON results into one
          node -e "
            const fs = require('fs');
            const path = require('path');
            const dirs = fs.readdirSync('all-results');
            const merged = { stats: { expected: 0, unexpected: 0, flaky: 0, skipped: 0, duration: 0 }, suites: [] };
            for (const dir of dirs) {
              const file = path.join('all-results', dir, 'test-results.json');
              if (fs.existsSync(file)) {
                const data = JSON.parse(fs.readFileSync(file, 'utf8'));
                merged.stats.expected += data.stats?.expected || 0;
                merged.stats.unexpected += data.stats?.unexpected || 0;
                merged.stats.flaky += data.stats?.flaky || 0;
                merged.stats.skipped += data.stats?.skipped || 0;
                merged.stats.duration += data.stats?.duration || 0;
                merged.suites.push(...(data.suites || []));
              }
            }
            fs.writeFileSync('test-results.json', JSON.stringify(merged, null, 2));
            console.log('Merged stats:', merged.stats);
          "

          # Generate Playwright HTML report from all test-results folders
          cp -r all-results/*/test-results/* test-results/ 2>/dev/null || true
          npx playwright show-report --host 0.0.0.0 &
          sleep 2
          kill %1 2>/dev/null || true

      - name: Generate HTML report
        run: npx playwright test --reporter=html --last-failed || true

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30

      - name: Upload Ortoni HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ortoni-report-${{ github.run_id }}
          path: ortoni-report/
          retention-days: 30

      - name: Parse test results
        if: always()
        id: parse_results
        run: |
          if [ -f test-results.json ]; then
            TOTAL=$(jq '.stats.expected + .stats.unexpected + .stats.flaky + .stats.skipped' test-results.json)
            PASSED=$(jq '.stats.expected' test-results.json)
            FAILED=$(jq '.stats.unexpected' test-results.json)
            SKIPPED=$(jq '.stats.skipped' test-results.json)
            DURATION=$(jq '.stats.duration' test-results.json)
            DURATION_SEC=$((DURATION / 1000))
          else
            TOTAL="N/A"
            PASSED="N/A"
            FAILED="N/A"
            SKIPPED="N/A"
            DURATION_SEC="N/A"
          fi
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
          echo "duration=$DURATION_SEC" >> $GITHUB_OUTPUT

      - name: Send Google Chat notification
        if: always()
        env:
          GOOGLE_CHAT_WEBHOOK: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
          TEST_RESULT: ${{ needs.e2e-tests.result }}
          TOTAL: ${{ steps.parse_results.outputs.total }}
          PASSED: ${{ steps.parse_results.outputs.passed }}
          FAILED: ${{ steps.parse_results.outputs.failed }}
          SKIPPED: ${{ steps.parse_results.outputs.skipped }}
          DURATION: ${{ steps.parse_results.outputs.duration }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$TEST_RESULT" == "success" ]; then
            STATUS_ICON="✅"
            STATUS_TEXT="PASSED"
          else
            STATUS_ICON="❌"
            STATUS_TEXT="FAILED"
          fi

          curl -X POST "$GOOGLE_CHAT_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"cards\": [{
                \"header\": {
                  \"title\": \"${STATUS_ICON} E2E Test Report - ${STATUS_TEXT}\",
                  \"subtitle\": \"Joiviva QA Automation\"
                },
                \"sections\": [{
                  \"widgets\": [
                    {
                      \"keyValue\": {
                        \"topLabel\": \"Total Tests\",
                        \"content\": \"${TOTAL}\"
                      }
                    },
                    {
                      \"keyValue\": {
                        \"topLabel\": \"Passed\",
                        \"content\": \"${PASSED}\"
                      }
                    },
                    {
                      \"keyValue\": {
                        \"topLabel\": \"Failed\",
                        \"content\": \"${FAILED}\"
                      }
                    },
                    {
                      \"keyValue\": {
                        \"topLabel\": \"Skipped\",
                        \"content\": \"${SKIPPED}\"
                      }
                    },
                    {
                      \"keyValue\": {
                        \"topLabel\": \"Duration\",
                        \"content\": \"${DURATION}s\"
                      }
                    },
                    {
                      \"buttons\": [{
                        \"textButton\": {
                          \"text\": \"VIEW FULL REPORT\",
                          \"onClick\": {
                            \"openLink\": {
                              \"url\": \"${RUN_URL}\"
                            }
                          }
                        }
                      }]
                    }
                  ]
                }]
              }]
            }"
